<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛自动回放 - 五子棋对战平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar {
            border-radius: 15px;
            margin: 0 20px 20px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-height: 60px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .navbar .btn {
            height: 36px;
            padding: 6px 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .navbar-nav {
            align-items: center;
        }

        .navbar-nav .nav-link,
        .navbar-text {
            display: flex;
            align-items: center;
            height: 40px;
        }

        .replay-card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 20px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            border-radius: 20px 20px 0 0 !important;
            padding: 1.5rem;
        }

        .card-header h4 {
            font-weight: 600;
            margin: 0;
            text-align: center;
        }

        .card-body {
            padding: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }

        .match-summary {
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: white;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .mono {
            font-family: 'Roboto Mono', monospace;
        }

        .player-chip {
            border-radius: 8px;
            padding: 0.35rem 0.65rem;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            display: inline-block;
        }

        .p1 {
            color: #0e7490;
            background: #cffafe;
        }

        .p2 {
            color: #b91c1c;
            background: #fee2e2;
        }

        .dim {
            color: #718096;
        }

        .status-valid {
            color: #0e7490;
            font-weight: 600;
        }

        .status-win {
            color: #38a169;
            font-weight: 600;
        }

        .status-draw {
            color: #b7791f;
            font-weight: 600;
        }

        .status-error {
            color: #e53e3e;
            font-weight: 600;
        }

        .board-wrap {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .board {
            display: grid;
            width: min(78vw, 690px);
            min-width: 330px;
            aspect-ratio: 1;
            position: relative;
            background: #fffaf0;
            border: 2px solid #cbd5e0;
            border-radius: 12px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
        }

        .grid-line {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            background: rgba(113, 128, 150, 0.58);
        }

        .grid-line-horizontal {
            left: var(--board-line-inset);
            right: var(--board-line-inset);
            top: var(--line-position);
            height: 2px;
            transform: translateY(-1px);
        }

        .grid-line-vertical {
            top: var(--board-line-inset);
            bottom: var(--board-line-inset);
            left: var(--line-position);
            width: 2px;
            transform: translateX(-1px);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            aspect-ratio: 1;
            position: relative;
            z-index: 2;
            background: transparent;
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(13px, 2.2vw, 25px);
            line-height: 1;
        }

        .cell-empty {
            color: #a0aec0;
        }

        .cell-p1 {
            color: #0e7490;
        }

        .cell-p2 {
            color: #b91c1c;
        }

        .cell-skill-p1 {
            color: #3182ce;
        }

        .cell-skill-p2 {
            color: #e53e3e;
        }

        .cell-last {
            text-shadow: 0 0 8px rgba(72, 187, 120, 0.75);
        }

        .cell-skill-last {
            text-shadow: 0 0 8px rgba(214, 158, 46, 0.85);
        }

        .info-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .info-item {
            min-width: 0;
            border-radius: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .info-label {
            opacity: 0.85;
            font-size: 0.78rem;
            margin-bottom: 4px;
        }

        .info-value {
            font-family: 'Roboto Mono', monospace;
            overflow-wrap: anywhere;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: white;
            padding: 1rem;
        }

        .progress {
            height: 8px;
            border-radius: 8px;
            background-color: #e2e8f0;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            border-radius: 8px;
            background: linear-gradient(45deg, #48bb78, #38a169);
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-light {
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .btn-outline-light:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .speed-select {
            width: 150px;
        }

        code {
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            color: #e2e8f0;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .info-strip {
                grid-template-columns: 1fr;
            }

            .card-body {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">🏁 五子棋AI对战平台</a>
                <div class="navbar-nav ms-auto">
                    <span class="navbar-text me-3" v-if="currentUser">欢迎，学号：{{ currentUser }}</span>
                    <a href="upload.html" class="nav-link me-3">上传AI</a>
                    <a href="results.html" class="nav-link me-3">我的记录</a>
                    <a href="rankings.html" class="nav-link me-3">排行榜</a>
                    <a href="change-password.html" class="nav-link me-3">修改密码</a>
                    <button class="btn btn-outline-light btn-sm" @click="logout" v-if="currentUser">登出</button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="row">
                <div class="col-12">
                    <div class="replay-card card">
                        <div
                            class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                            <h4 class="mb-0">🎬 比赛自动回放</h4>
                            <a href="results.html" class="btn btn-outline-light btn-sm">返回结果页</a>
                        </div>
                        <div class="card-body">
                            <div v-if="loading" class="text-center p-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <p class="mt-2 text-muted">正在加载比赛记录...</p>
                            </div>

                            <div v-else-if="error" class="text-center p-5">
                                <h5 class="text-danger">{{ error }}</h5>
                                <a href="results.html" class="btn btn-primary mt-3">返回结果页</a>
                            </div>

                            <template v-else>
                                <div class="match-summary">
                                    <div class="d-flex flex-wrap justify-content-between gap-3 align-items-start">
                                        <div>
                                            <div class="fs-5">
                                                <span class="player-chip p1">{{ match.challenger_submission_id
                                                    }}</span>
                                                <span class="text-muted mx-2">VS</span>
                                                <span class="player-chip p2">{{ match.defender_submission_id }}</span>
                                            </div>
                                            <div class="text-muted mt-3">
                                                第 {{ game.game_number }} 局 · 自动播放 {{ intervalLabel }} 秒/步 · 胜者：
                                                <span :class="winnerClass(game.winner)">{{
                                                    gameWinnerLabel(game.winner) }}</span>
                                            </div>
                                        </div>
                                        <span class="badge bg-primary">仅自动回放</span>
                                    </div>
                                    <div class="mt-3 text-muted">{{ currentFrame.caption }}</div>
                                    <div v-if="currentFrame.move" class="mt-2 mono">
                                        status:
                                        <span :class="moveStatusClass(currentFrame.move.result)">{{
                                            currentFrame.move.result || 'unknown' }}</span>
                                        <span class="text-muted ms-3">step time:
                                            {{ Number(currentFrame.move.time_taken || 0).toFixed(3) }}s</span>
                                    </div>
                                </div>

                                <div class="board-wrap">
                                    <div class="board" :style="boardStyle">
                                        <div v-for="line in gridLines.horizontal" :key="line.key"
                                            class="grid-line grid-line-horizontal" :style="line.style"></div>
                                        <div v-for="line in gridLines.vertical" :key="line.key"
                                            class="grid-line grid-line-vertical" :style="line.style"></div>
                                        <div v-for="cell in flatBoard" :key="`${cell.row}-${cell.col}`"
                                            :class="cellClass(cell)" :title="`(${cell.row}, ${cell.col})`">
                                            {{ cellText(cell.value) }}
                                        </div>
                                    </div>
                                </div>

                                <div class="info-strip">
                                    <div class="info-item">
                                        <div class="info-label">当前帧</div>
                                        <div class="info-value">{{ frameIndex }}/{{ totalMoves }}</div>
                                    </div>
                                    <div class="info-item">
                                        <div class="info-label">最后落子</div>
                                        <div class="info-value">{{ lastMoveText }}</div>
                                    </div>
                                    <div class="info-item">
                                        <div class="info-label">本局耗时</div>
                                        <div class="info-value">{{ Number(game.duration || 0).toFixed(2) }}s</div>
                                    </div>
                                    <div class="info-item">
                                        <div class="info-label">先手</div>
                                        <div class="info-value">{{ firstPlayerLabel }}</div>
                                    </div>
                                </div>

                                <div class="progress">
                                    <div class="progress-bar" :style="{ width: progressPercent + '%' }"></div>
                                </div>

                                <div class="controls">
                                    <div class="text-muted mono">
                                        {{ isFinished ? 'Playback complete' : 'Autoplay running' }}
                                    </div>
                                    <div class="d-flex gap-2 align-items-center">
                                        <select class="form-select form-select-sm speed-select" v-model.number="interval"
                                            @change="restartAutoplay">
                                            <option :value="0.25">0.25s / step</option>
                                            <option :value="0.5">0.5s / step</option>
                                            <option :value="1">1.0s / step</option>
                                            <option :value="1.5">1.5s / step</option>
                                        </select>
                                        <button class="btn btn-primary btn-sm" @click="replay">重新播放</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        const EMPTY = 0;
        const PLAYER1_STONE = 1;
        const PLAYER2_STONE = 2;
        const PLAYER1_SKILL = 3;
        const PLAYER2_SKILL = 4;
        const VALID_RESULTS = new Set(['valid', 'winning_move', 'draw_move']);
        const TERMINAL_RESULTS = new Set([
            'winning_move',
            'draw_move',
            'timeout',
            'exception',
            'invalid_move',
            'invalid_position',
            'blocked_position'
        ]);

        createApp({
            data() {
                return {
                    currentUser: '',
                    loading: true,
                    error: '',
                    match: null,
                    game: null,
                    frames: [],
                    frameIndex: 0,
                    timer: null,
                    interval: 0.5
                };
            },
            computed: {
                currentFrame() {
                    return this.frames[this.frameIndex] || { board: [], move: null, caption: '' };
                },
                boardSize() {
                    return this.currentFrame.board.length || 15;
                },
                boardStyle() {
                    return {
                        gridTemplateColumns: `repeat(${this.boardSize}, minmax(0, 1fr))`,
                        '--board-line-inset': `${50 / this.boardSize}%`
                    };
                },
                gridLines() {
                    const lines = { horizontal: [], vertical: [] };
                    for (let index = 0; index < this.boardSize; index += 1) {
                        const position = `${((index + 0.5) / this.boardSize) * 100}%`;
                        lines.horizontal.push({
                            key: `h-${index}`,
                            style: { '--line-position': position }
                        });
                        lines.vertical.push({
                            key: `v-${index}`,
                            style: { '--line-position': position }
                        });
                    }
                    return lines;
                },
                flatBoard() {
                    const cells = [];
                    this.currentFrame.board.forEach((row, rowIndex) => {
                        row.forEach((value, colIndex) => {
                            cells.push({ row: rowIndex, col: colIndex, value });
                        });
                    });
                    return cells;
                },
                totalMoves() {
                    return Math.max(this.frames.length - 1, 0);
                },
                progressPercent() {
                    if (this.totalMoves === 0) {
                        return 100;
                    }
                    return Math.round((this.frameIndex / this.totalMoves) * 100);
                },
                isFinished() {
                    return this.frameIndex >= this.frames.length - 1;
                },
                intervalLabel() {
                    return Number(this.interval).toFixed(2).replace(/0$/, '').replace(/\.$/, '');
                },
                firstPlayerLabel() {
                    return this.game?.challenger_first ?
                        this.match.challenger_submission_id :
                        this.match.defender_submission_id;
                },
                lastMoveText() {
                    const move = this.currentFrame.move;
                    if (!move) {
                        return 'Start position';
                    }
                    const position = Array.isArray(move.move) && move.move.length === 2 ?
                        `(${this.safeInt(move.move[0])}, ${this.safeInt(move.move[1])})` :
                        'no stone';
                    return `P${this.safeInt(move.player)} ${position}`;
                }
            },
            methods: {
                async loadReplay() {
                    try {
                        const authResponse = await fetch('/api/auth-status');
                        const authData = await authResponse.json();
                        if (!authData.loggedIn) {
                            window.location.href = 'index.html';
                            return;
                        }
                        this.currentUser = authData.studentId;

                        const params = new URLSearchParams(window.location.search);
                        const matchId = params.get('matchId');
                        const gameNumber = this.safeInt(params.get('game'), 1);

                        const response = await fetch('/api/my-results');
                        const data = await response.json();
                        const matches = data.matches || [];
                        this.match = matches.find(item => item.id === matchId);

                        if (!this.match) {
                            this.error = '找不到该比赛记录，或当前账号无权查看。';
                            return;
                        }

                        const games = Array.isArray(this.match.games) ? this.match.games : [];
                        this.game = games.find(item => this.safeInt(item.game_number) === gameNumber);
                        if (!this.game) {
                            this.error = '找不到该局记录。';
                            return;
                        }

                        this.frames = this.buildFrames(this.match, this.game);
                        this.frameIndex = 0;
                        this.startAutoplay();
                    } catch (err) {
                        console.error('加载回放失败:', err);
                        this.error = '加载回放失败。';
                    } finally {
                        this.loading = false;
                    }
                },
                buildFrames(match, game) {
                    const record = game.game_record || {};
                    const boardSize = this.safeInt(record.board_size, 15);
                    const moves = Array.isArray(record.moves) ? record.moves : [];
                    const skillCasts = Array.isArray(record.skill_casts) ? record.skill_casts : [];
                    const board = this.createBoard(boardSize);
                    const blockedCellForPlayer = { 1: null, 2: null };
                    const skillByMove = new Map(skillCasts.map(cast => [this.safeInt(cast.move_number), cast]));
                    const frames = [{
                        moveIndex: 0,
                        board: this.cloneBoard(board),
                        move: null,
                        skillCast: null,
                        caption: 'Start position'
                    }];

                    moves.forEach(move => {
                        const moveNumber = this.safeInt(move.move_number);
                        const player = this.safeInt(move.player);
                        const result = String(move.result || 'unknown');
                        const cast = skillByMove.get(moveNumber);

                        if (cast && Array.isArray(cast.position) && cast.position.length === 2) {
                            const row = this.safeInt(cast.position[0]);
                            const col = this.safeInt(cast.position[1]);
                            if (this.isValidPosition(board, row, col)) {
                                board[row][col] = this.getSkillMarker(player);
                                blockedCellForPlayer[3 - player] = [row, col];
                            }
                        }

                        if (VALID_RESULTS.has(result) && Array.isArray(move.move) && move.move.length === 2) {
                            const row = this.safeInt(move.move[0]);
                            const col = this.safeInt(move.move[1]);
                            if (this.isValidPosition(board, row, col)) {
                                board[row][col] = player;
                            }
                        }

                        if (!TERMINAL_RESULTS.has(result)) {
                            this.clearBlockForPlayer(board, blockedCellForPlayer, player);
                        }

                        frames.push({
                            moveIndex: moveNumber,
                            board: this.cloneBoard(board),
                            move,
                            skillCast: cast || null,
                            caption: this.describeMove(move, cast)
                        });
                    });

                    return frames;
                },
                startAutoplay() {
                    this.clearTimer();
                    if (this.frames.length <= 1 || this.isFinished) {
                        return;
                    }
                    this.timer = window.setInterval(() => {
                        if (this.frameIndex >= this.frames.length - 1) {
                            this.clearTimer();
                            return;
                        }
                        this.frameIndex += 1;
                    }, Number(this.interval) * 1000);
                },
                restartAutoplay() {
                    if (!this.isFinished) {
                        this.startAutoplay();
                    }
                },
                replay() {
                    this.frameIndex = 0;
                    this.startAutoplay();
                },
                clearTimer() {
                    if (this.timer) {
                        window.clearInterval(this.timer);
                        this.timer = null;
                    }
                },
                createBoard(size) {
                    return Array.from({ length: size }, () => Array(size).fill(EMPTY));
                },
                cloneBoard(board) {
                    return board.map(row => row.slice());
                },
                isValidPosition(board, row, col) {
                    const size = board.length;
                    return row >= 0 && row < size && col >= 0 && col < size;
                },
                getSkillMarker(player) {
                    return player === 1 ? PLAYER1_SKILL : PLAYER2_SKILL;
                },
                clearBlockForPlayer(board, blockedCellForPlayer, player) {
                    const blockedCell = blockedCellForPlayer[player];
                    if (!blockedCell) {
                        return;
                    }
                    const [row, col] = blockedCell;
                    const caster = 3 - player;
                    const expectedMarker = this.getSkillMarker(caster);
                    if (this.isValidPosition(board, row, col) && board[row][col] === expectedMarker) {
                        board[row][col] = EMPTY;
                    }
                    blockedCellForPlayer[player] = null;
                },
                describeMove(move, skillCast) {
                    const player = this.safeInt(move.player);
                    const result = String(move.result || 'unknown');
                    const parts = [`move ${this.safeInt(move.move_number)}`, `player ${player}`];

                    if (Array.isArray(move.move) && move.move.length === 2) {
                        parts.push(`stone (${this.safeInt(move.move[0])}, ${this.safeInt(move.move[1])})`);
                    } else {
                        parts.push('no stone');
                    }

                    if (skillCast && Array.isArray(skillCast.position) && skillCast.position.length === 2) {
                        parts.push(`skill (${this.safeInt(skillCast.position[0])}, ${this.safeInt(skillCast.position[1])})`);
                    }

                    parts.push(`time ${Number(move.time_taken || 0).toFixed(3)}s`);
                    parts.push(`status ${result}`);

                    if (move.error) {
                        parts.push(`error ${move.error}`);
                    }

                    return parts.join(' | ');
                },
                cellClass(cell) {
                    const classes = ['cell'];
                    const move = this.currentFrame.move;
                    const cast = this.currentFrame.skillCast;

                    if (cell.value === EMPTY) classes.push('cell-empty');
                    if (cell.value === PLAYER1_STONE) classes.push('cell-p1');
                    if (cell.value === PLAYER2_STONE) classes.push('cell-p2');
                    if (cell.value === PLAYER1_SKILL) classes.push('cell-skill-p1');
                    if (cell.value === PLAYER2_SKILL) classes.push('cell-skill-p2');

                    if (move && Array.isArray(move.move) && move.move[0] === cell.row && move.move[1] === cell.col) {
                        classes.push('cell-last');
                    }

                    if (cast && Array.isArray(cast.position) && cast.position[0] === cell.row && cast.position[1] === cell.col) {
                        classes.push('cell-skill-last');
                    }

                    return classes;
                },
                cellText(value) {
                    if (value === PLAYER1_STONE) return '●';
                    if (value === PLAYER2_STONE) return '●';
                    if (value === PLAYER1_SKILL) return '◆';
                    if (value === PLAYER2_SKILL) return '◆';
                    return '';
                },
                gameWinnerLabel(winner) {
                    const normalizedWinner = this.normalizeWinner(winner);
                    if (normalizedWinner === 'tie' || normalizedWinner === 0) return 'Draw';
                    if (normalizedWinner === 1) return `Challenger ${this.match.challenger_submission_id}`;
                    if (normalizedWinner === 2) return `Defender ${this.match.defender_submission_id}`;
                    return String(winner || 'unknown');
                },
                winnerClass(winner) {
                    const normalizedWinner = this.normalizeWinner(winner);
                    if (normalizedWinner === 1) return 'p1';
                    if (normalizedWinner === 2) return 'p2';
                    if (normalizedWinner === 'tie' || normalizedWinner === 0) return 'status-draw';
                    return 'dim';
                },
                moveStatusClass(result) {
                    if (result === 'winning_move') return 'status-win';
                    if (result === 'draw_move') return 'status-draw';
                    if (result === 'valid') return 'status-valid';
                    return 'status-error';
                },
                normalizeWinner(winner) {
                    if (winner === '1') return 1;
                    if (winner === '2') return 2;
                    return winner;
                },
                async logout() {
                    try {
                        await fetch('/api/logout', { method: 'POST' });
                        window.location.href = 'index.html';
                    } catch (error) {
                        console.error('登出错误:', error);
                        window.location.href = 'index.html';
                    }
                },
                safeInt(value, fallback = 0) {
                    const parsed = Number.parseInt(value, 10);
                    return Number.isNaN(parsed) ? fallback : parsed;
                }
            },
            mounted() {
                this.loadReplay();
            },
            beforeUnmount() {
                this.clearTimer();
            }
        }).mount('#app');
    </script>
</body>

</html>
